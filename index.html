<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport: ensures proper scaling on mobile devices
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Dataverse News — Trusted Stories, Verified Sources</title>
    <meta name="description" content="Dataverse News aggregates breaking news and in-depth stories from verified global sources. Stay informed with trusted journalism." />
    <meta name="theme-color" content="#0a0f1e" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dataverse News" />
    <meta property="og:description" content="Trusted stories. Verified sources." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Fonts loaded from Google Fonts:
      - "Playfair Display" : editorial serif for headlines
      - "DM Sans"          : clean modern sans for body text
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      #root is where React mounts.
      Everything you see on screen is rendered inside this div.
    -->
    <div id="root"></div>

    <!--
      main.jsx is the React entry point.
      Vite processes this and injects the bundle automatically.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
